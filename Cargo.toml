# Womanizer workspace manifest.
#
# Dependency versions are pinned ONCE here in [workspace.dependencies] and referenced
# with `workspace = true` from each member crate (D-01 layering + single-source pinning).
#
# CONSCIOUS DIVERGENCE FROM the project spec PINS (per the stack research § Version Drift, Open Question 1):
#   the project spec authored older pins; we follow current-latest verified on crates.io 2026-05-28.
#     - triple_buffer  8   -> 9    (MAJOR bump; 9.0 (Input, Output)+write/read API verified
#                                   compatible with the smoke-test usage in Plan 02)
#     - rusqlite       0.39 -> 0.40 (published 2026-05-26; current)
#     - directories    5   -> 6    (ProjectDirs::from + data_dir() API stable across 5->6)
#     - rtrb           0.3.3 -> 0.3.4 (patch)
#   These are deliberate, not accidental drift.
#
# assert_no_alloc uses features = ["warn_debug"] (per RESEARCH A1) so the INFRA-03 violation
# test can catch the allocation via a #[should_panic] (default behavior aborts, not catchable).
#
# rusqlite carries the mandatory `bundled` feature (Pitfall 5): compiles SQLite from source so
# there is zero system dependency on Windows or macOS, preserving the single-binary promise.

[workspace]
resolver = "2"
members = [
    "crates/womanizer-core",
    "crates/womanizer-db",
    "crates/womanizer-app",
]

[workspace.dependencies]
# --- Core cross-thread plumbing (womanizer-core) ---
rtrb = "0.3.4"
triple_buffer = "9"
atomic_float = "1"
crossbeam-channel = "0.5"
assert_no_alloc = { version = "1", features = ["warn_debug"] }

# --- Persistence (womanizer-db) ---
rusqlite = { version = "0.40", features = ["bundled"] }
rusqlite_migration = "2"
directories = "6"

# --- Serialization ---
serde = { version = "1", features = ["derive"] }
serde_json = "1"

# --- Errors ---
thiserror = "2"
anyhow = "1"

# --- Logging (never from the audio callback) ---
tracing = "0.1"
tracing-subscriber = "0.3"

# --- Declared so the dep graph + license gate are real and INFRA-01 proves the ACTUAL
#     binary builds on both OSes (Open Question 2). NOT wired in Phase 0. ---
cpal = "0.17"
eframe = "0.34"
egui = "0.34"

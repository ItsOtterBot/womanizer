# MSRV pin 1.92 — the mandated-dependency floor.
# cpal's WASAPI backend needs rustc 1.82+ as a minimum (a floor, not a ceiling); 1.92 satisfies it.
# 1.92 is required by the GUI stack: egui/eframe 0.34.3 declare rust-version 1.92, and their
# wgpu 29 / naga 29 / icu 2.2 dependencies require 1.86-1.88, so the MSRV-aware resolver needs
# 1.92 to resolve a clean checkout. The floor is raised in one place here rather than constraining
# many transitive crates individually. rustup auto-installs this toolchain on first cargo invocation.
[toolchain]
channel = "1.92"
components = ["clippy", "rustfmt"]
